# Copy this file to config/settings.toml and fill in your values.
# config/settings.toml is gitignored — never commit real paths or IDs.

[bridge]
host = "127.0.0.1"
port = 9100
log_level = "INFO"

[auth]
token_file = "/path/to/agentic-ai/secrets/bridge.token"

[mail]
source = "mailapp"
max_batch = 25
max_body_text_bytes = 200000
initial_lookback_days = 15

[mail.ai]
enabled = false
provider = "ollama"
base_url = "http://host.docker.internal:11434"
model = "gemma3:4b"
temperature = 0.1
timeout_seconds = 45
max_body_chars = 12000
urgency_threshold = 8

[mail.imap_mutations]
enabled = false
allow_create_folder = false
allow_copy_delete_fallback = false
dry_run_default = true

[mail.approvals]
enabled = true
require_approval_for_ai_actions = true
approval_expiry_hours = 72
default_expiry_minutes = 1440
started_stale_after_minutes = 30
allow_bulk_approve = false
auto_expire_pending_after_hours = 24
archive_terminal_after_days = 30
retain_audit_days = 365
cleanup_enabled = false

[imessage]
primary_recipient = "your-apple-id@icloud.com"
authorized_senders = ["your-apple-id@icloud.com"]
command_prefix = "agent:"
max_alerts_per_hour = 60
max_commands_per_hour = 60
startup_notifications = true
shutdown_notifications = false
allow_same_account_commands = true

[classifier]
provider_order = ["ollama"]
cloud_fallback_enabled = false
generic_alert_on_total_failure = true
allowed_sender_domains = [
  "yourbank.com",
]

[ollama]
host = "http://host.docker.internal:11434"
model_primary = "gemma3:4b"
timeout_seconds = 60

[agent]
poll_interval_seconds = 1800
command_poll_interval_seconds = 30
alert_on_categories = [
  "transaction_alert",
  "bill_statement",
  "bank_clarification",
  "payment_due",
  "security_alert",
  "financial_other"
]

[pdf]
inbox_dir = "/path/to/agentic-ai/data/pdf_inbox"
unlocked_dir = "/path/to/agentic-ai/data/pdf_unlocked"
xls_output_dir = "/path/to/agentic-ai/output/xls"
bank_passwords_file = "/path/to/agentic-ai/secrets/banks.toml"
jobs_db = "/path/to/agentic-ai/data/pdf_jobs.db"
attachment_seen_db = "/path/to/agentic-ai/data/seen_attachments.db"
attachment_lookback_days = 60
parser_llm_model = "gemma3:4b"
verify_enabled = true
verify_mode = "warn"
verify_ollama_host = "http://localhost:11434"
verify_timeout_seconds = 120
verify_model = "gemma3:4b"

[pipeline]
enabled = false
scan_interval_seconds = 14400
auto_import_enabled = true
auto_sync_enabled = true
completeness_alert = true
parse_alert = true
failure_alert = true
startup_delay_seconds = 60

[owners]
"YourFirstName" = "Owner1"

[finance]
xlsx_input = "/path/to/agentic-ai/output/xls/ALL_TRANSACTIONS.xlsx"
sqlite_db  = "/path/to/agentic-ai/data/finance.db"

[finance.internal_transfers]
pairs = []

[google_sheets]
credentials_file = "/path/to/agentic-ai/secrets/google_credentials.json"
token_file       = "/path/to/agentic-ai/secrets/google_token.json"
# Set GOOGLE_SPREADSHEET_ID env var to override at runtime (recommended)
spreadsheet_id   = "YOUR_SPREADSHEET_ID_HERE"
transactions_tab = "Transactions"
aliases_tab      = "Merchant Aliases"
categories_tab   = "Categories"
currency_tab     = "Currency Codes"
import_log_tab        = "Import Log"
overrides_tab         = "Category Overrides"
pdf_import_log_tab    = "PDF Import Log"
holdings_tab          = "Holdings"

[fastapi]
host         = "0.0.0.0"
port         = 8090
cors_origins = ["http://localhost:5173"]

[ollama_finance]
host            = "http://localhost:11434"
model           = "gemma3:4b"
timeout_seconds = 60
