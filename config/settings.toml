[bridge]
host = "0.0.0.0"
port = 9100
log_level = "INFO"

[auth]
token_file = "/Users/g4ndr1k/agentic-ai/secrets/bridge.token"
# Set token_source = "keychain" after running: python3 -m bridge.secret_manager init
token_source = "keychain"            # "file" (default) or "keychain"
keychain_service = "agentic-ai-bridge"

[mail]
source = "gmail"
gmail_secrets_file = "/Users/g4ndr1k/agentic-ai/secrets/gmail.toml"
max_batch = 25
max_body_text_bytes = 200000
initial_lookback_days = 15

[mail.ai]
enabled = false
provider = "ollama"
base_url = "http://host.docker.internal:11434"
model = "gemma3:4b"
temperature = 0.1
timeout_seconds = 45
max_body_chars = 12000
urgency_threshold = 8

[mail.imap_mutations]
enabled = false
allow_create_folder = false
allow_copy_delete_fallback = false
dry_run_default = true

[mail.approvals]
enabled = true
require_approval_for_ai_actions = true
approval_expiry_hours = 72
default_expiry_minutes = 1440
started_stale_after_minutes = 30
allow_bulk_approve = false
auto_expire_pending_after_hours = 24
archive_terminal_after_days = 30
retain_audit_days = 365
cleanup_enabled = false

[imessage]
primary_recipient = "emanuel.adrianto@icloud.com"
authorized_senders = ["emanuel.adrianto@icloud.com"]
command_prefix = "agent:"
max_alerts_per_hour = 60
max_commands_per_hour = 60
startup_notifications = true
shutdown_notifications = false
allow_same_account_commands = true

[classifier]
provider_order = ["rule_based"]
cloud_fallback_enabled = false
generic_alert_on_total_failure = true
finance_api_url = ""                  # overridden by FINANCE_API_URL env var in Docker
rule_reload_interval_seconds = 3600
# Only process emails whose sender_email domain matches one of these.
# All other senders are silently skipped before any LLM call is made.
# NOTE: When Finance API is reachable, mail rules are loaded from the DB
# (GET /api/mail-rules) instead of this TOML list.
allowed_sender_domains = [
  "maybank.co.id",
  "cimbniaga.co.id",
  "permatabank.co.id",
  "bca.co.id",
  "klikbca.com",
]

[ollama]
host = "http://host.docker.internal:11434"
model_primary = "gemma3:4b"
timeout_seconds = 60

[agent]
# Mail scan interval: 1800 = 30 minutes
poll_interval_seconds = 1800
# Command check interval: 30 seconds for responsive iMessage commands
command_poll_interval_seconds = 30
alert_on_categories = [
  "transaction_alert",
  "bill_statement",
  "bank_clarification",
  "payment_due",
  "security_alert",
  "financial_other"
]

# ── Safety mode ladder (backend-enforced) ───────────────────────────────
# observe    = fetch+classify only, no alerts, no PDF route, no mutation
# draft_only = fetch+classify+alert+PDF route, no send/label/move (DEFAULT)
# live       = all actions allowed (requires explicit setting)
# Invalid/missing → draft_only (never live)
mode = "draft_only"
safe_default = "draft_only"

# --- Future features (not implemented in v1) ---
#[routing]
#default_recipients = ["emanuel.adrianto@icloud.com"]
#secondary_recipients = []
#category_routes = {}

#[future]
#secondary_recipients_enabled = false
#pdf_processing_enabled = false
#web_ui_enabled = false

# ── IMAP intake (Phase A.5) ────────────────────────────────────────────
# Replaces Mail.app SQLite reader on the mail-agent path.
# Gmail App Password stored in Keychain (service: agentic-ai-mail-imap).
# Outlook deferred until OAuth2 device-code flow is implemented.

[mail.imap]
accounts = [
  {email = "g4ndr1k@gmail.com", provider = "gmail", id = "gmail_g4ndr1k", name = "g4ndr1k", host = "imap.gmail.com", port = 993, ssl = true, auth_type = "app_password", folders = ["INBOX"], lookback_days = 14, max_message_mb = 25, max_attachment_mb = 20, enabled = true, auth_source = "keychain", keychain_service = "agentic-ai-mail-imap"},
  {email = "dianpratiwi@gmail.com", provider = "gmail", id = "gmail_dianpratiwi", name = "Dian Pratiwi", host = "imap.gmail.com", port = 993, ssl = true, auth_type = "app_password", folders = ["INBOX"], lookback_days = 14, max_message_mb = 25, max_attachment_mb = 20, enabled = true, auth_source = "keychain", keychain_service = "agentic-ai-mail-imap"},
]
max_message_mb = 25
max_attachment_mb = 20

# ── PDF ingest-decrypt-route pipeline (Phase B) ────────────────────────
[mail_agent.pdf]
nas_root = "/mnt/mailagent"                    # inside container
host_nas_root = "/Volumes/Synology/mailagent"  # on host
categories = ["invoices", "statements", "receipts", "other"]
filename_regex = "^\\d{4}-\\d{2}-\\d{2}_[A-Za-z0-9][A-Za-z0-9_-]{1,40}_[a-z][a-z0-9_-]{1,30}\\.pdf$"
mount_sentinel_uuid = ""  # set by scripts/setup_nas_sentinel.py
sentinel_path = ".mailagent_mount"
ollama_host = "http://host.docker.internal:11434"
ollama_model = "gemma3:4b"

# ─────────────────────────────────────────────────────────────────────────────
# ADD THIS SECTION to your existing config/settings.toml
# ─────────────────────────────────────────────────────────────────────────────

[pdf]
# Directory where uploaded PDFs are stored before processing
inbox_dir = "/Users/g4ndr1k/agentic-ai/data/pdf_inbox"

# Directory where unlocked (password-removed) copies are saved
unlocked_dir = "/Users/g4ndr1k/agentic-ai/data/pdf_unlocked"

# Directory where output XLS files are saved — one file per bank, accumulates over time
xls_output_dir = "/Users/g4ndr1k/agentic-ai/output/xls"

# Path to bank PDF passwords file (gitignored)
bank_passwords_file = "/Users/g4ndr1k/agentic-ai/secrets/banks.toml"
# Set bank_passwords_source = "keychain" after running: python3 -m bridge.secret_manager init
bank_passwords_source = "keychain"    # "file" (default) or "keychain"

# SQLite DB for PDF processing jobs
jobs_db = "/Users/g4ndr1k/agentic-ai/data/pdf_jobs.db"

# SQLite DB for tracking already-scanned Mail.app attachments
attachment_seen_db = "/Users/g4ndr1k/agentic-ai/data/seen_attachments.db"

# How many days back to scan for attachments in Mail.app
attachment_lookback_days = 60

# Ollama model for Layer 3 LLM fallback parsing (same as mail agent)
parser_llm_model = "gemma3:4b"

# Parsed-PDF verification pass (warn-only by default)
verify_enabled = true
verify_mode = "warn"
verify_ollama_host = "http://localhost:11434"
verify_timeout_seconds = 120
verify_model = "gemma3:4b"

[pipeline]
enabled = true
scan_interval_seconds = 14400
auto_import_enabled = true
auto_sync_enabled = true
completeness_alert = true
parse_alert = true
failure_alert = true
startup_delay_seconds = 60

# Owner name mapping — substring match, case-insensitive, first match wins
# Maps customer names found in PDFs to canonical owner labels
# Used for output file naming (e.g. Maybank_Gandrik.xlsx) and ALL_TRANSACTIONS Owner column
[owners]
"Emanuel" = "Gandrik"
"Dian Pratiwi" = "Helen"

