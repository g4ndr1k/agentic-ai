# ADD THIS SECTION to your existing config/settings.toml
# ─────────────────────────────────────────────────────────────────────────────

[pdf]
# Directory where uploaded PDFs are stored before processing
inbox_dir = "/Users/g4ndr1k/agentic-ai/data/pdf_inbox"

# Directory where unlocked (password-removed) copies are saved
unlocked_dir = "/Users/g4ndr1k/agentic-ai/data/pdf_unlocked"

# Directory where output XLS files are saved — one file per bank, accumulates over time
xls_output_dir = "/Users/g4ndr1k/agentic-ai/output/xls"

# Path to bank PDF passwords file (gitignored)
bank_passwords_file = "/Users/g4ndr1k/agentic-ai/secrets/banks.toml"

# SQLite DB for PDF processing jobs
jobs_db = "/Users/g4ndr1k/agentic-ai/data/pdf_jobs.db"

# SQLite DB for tracking already-scanned Mail.app attachments
attachment_seen_db = "/Users/g4ndr1k/agentic-ai/data/seen_attachments.db"

# How many days back to scan for attachments in Mail.app
attachment_lookback_days = 60

# Ollama model for Layer 3 LLM fallback parsing (same as mail agent)
parser_llm_model = "gemma4:e4b"

# Parsed-PDF verification pass (warn-only by default)
verify_enabled = true
verify_mode = "warn"
verify_ollama_host = "http://localhost:11434"
verify_timeout_seconds = 120
verify_model = "gemma4:e4b"

# Owner name mapping — substring match, case-insensitive, first match wins
# Maps customer names found in PDFs to canonical owner labels
# Used for output file naming (e.g. Maybank_Gandrik.xlsx) and ALL_TRANSACTIONS Owner column
[owners]
"Emanuel" = "Gandrik"
"Dian Pratiwi" = "Helen"

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Personal Finance Dashboard
# ─────────────────────────────────────────────────────────────────────────────

[finance]
# Stage 1 output — immutable source for Stage 2 imports (never edit manually)
xlsx_input = "/Users/g4ndr1k/agentic-ai/output/xls/ALL_TRANSACTIONS.xlsx"
# Stage 2 SQLite read cache (throw away and rebuild anytime from Google Sheets)
sqlite_db  = "/Users/g4ndr1k/agentic-ai/data/finance.db"

[finance.internal_transfers]
pairs = [
  [["Gandrik", "2171138631"], ["Helen", "5500346622"]],
  [["Helen", "4123968773"], ["Helen", "2684118322"]],
  [["Helen", "4123968773"], ["Gandrik", "4123968447"]],
]

[google_sheets]
# Download from Google Cloud Console → APIs & Services → Credentials
# → OAuth 2.0 Client ID → Desktop app → Download JSON
credentials_file = "/Users/g4ndr1k/agentic-ai/secrets/google_credentials.json"
# Saved automatically after first OAuth consent; refreshed on expiry
token_file       = "/Users/g4ndr1k/agentic-ai/secrets/google_token.json"
# Optional: preferred long-term auth. If set, finance sync uses this service account
# instead of the personal OAuth token above.
service_account_file = "/Users/g4ndr1k/agentic-ai/secrets/google_service_account.json"
# Copy the ID from the Google Sheet URL:
# https://docs.google.com/spreadsheets/d/<SPREADSHEET_ID>/edit
spreadsheet_id   = "1vTtSFrXK4IoAmK1sTZkqiBD6qGEzSjsNEPPFiHZd-28"    # ← fill this in after creating the sheet

transactions_tab = "Transactions"
aliases_tab      = "Merchant Aliases"
categories_tab   = "Categories"
currency_tab     = "Currency Codes"
import_log_tab        = "Import Log"
overrides_tab         = "Category Overrides"
pdf_import_log_tab    = "PDF Import Log"
holdings_tab          = "Holdings"

[fastapi]
host         = "0.0.0.0"
port         = 8090           # distinct from bridge :9100 and agent health :8080
cors_origins = ["http://localhost:5173", "https://adrianto.synology.me:8443"]

[ollama_finance]
# Use localhost when running on the Mac host directly.
# Docker overrides this via OLLAMA_FINANCE_HOST env var (host.docker.internal).
host            = "http://localhost:11434"
model           = "gemma4:e4b"
timeout_seconds = 5

