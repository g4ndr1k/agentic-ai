services:
  # ── Stage 2-B — Personal Finance API ──────────────────────────────────────
  finance-api:
    build:
      context: .
      dockerfile: finance/Dockerfile
    container_name: finance-api
    restart: unless-stopped
    environment:
      SETTINGS_FILE: /app/config/settings.toml
      # Override host-absolute paths from settings.toml with container paths
      FINANCE_SQLITE_DB:        /app/data/finance.db
      FINANCE_XLSX_INPUT:       /app/output/xls/ALL_TRANSACTIONS.xlsx
      GOOGLE_CREDENTIALS_FILE:  /app/secrets/google_credentials.json
      GOOGLE_TOKEN_FILE:        /app/secrets/google_token.json
      GOOGLE_SERVICE_ACCOUNT_FILE: /app/secrets/google_service_account.json
      FINANCE_API_KEY:          ${FINANCE_API_KEY}
      GOOGLE_SPREADSHEET_ID:    ${GOOGLE_SPREADSHEET_ID:-}
      OLLAMA_FINANCE_HOST:      http://host.docker.internal:11434
    volumes:
      - ./config/settings.toml:/app/config/settings.toml:ro
      - ./data:/app/data
      - ./output/xls:/app/output/xls:ro
      - ./secrets:/app/secrets
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, os; req = urllib.request.Request('http://127.0.0.1:8090/api/health', headers={'X-Api-Key': os.environ.get('FINANCE_API_KEY', '')}); urllib.request.urlopen(req, timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Stage 1 — Mail Agent ───────────────────────────────────────────────────
  mail-agent:
    build:
      context: ./agent
    container_name: mail-agent
    restart: unless-stopped
    environment:
      SETTINGS_FILE: /app/config/settings.toml
      BRIDGE_URL: http://host.docker.internal:9100
      BRIDGE_TOKEN_FILE: /run/secrets/bridge.token

    volumes:
      - ./config/settings.toml:/app/config/settings.toml:ro
      - ./data:/app/data
      - ./secrets/bridge.token:/run/secrets/bridge.token:ro  # file, not directory
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 2g
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
